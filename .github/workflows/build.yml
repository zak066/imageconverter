name: Build Windows + Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build with PyInstaller
        run: |
          Remove-Item -Recurse -Force build -ErrorAction SilentlyContinue
          Remove-Item -Recurse -Force dist -ErrorAction SilentlyContinue
          pyinstaller --onefile `
            --name "ImageConverter" `
            --add-data "version.py;." `
            --add-data "config.py;." `
            --add-data "gui.py;." `
            --add-data "converter.py;." `
            --hidden-import "PIL._tkinter_finder" `
            --hidden-import "tkinterdnd2" `
            --hidden-import "pillow_avif_plugin" `
            main.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ImageConverter-win
          path: dist/ImageConverter.exe
          retention-days: 1

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: ImageConverter-win

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: ImageConverter.exe
          name: ${{ github.ref_name }}
          body: |
            ImageConverter ${{ github.ref_name }}
            - Windows executable
            - Convert images to WebP and AVIF
            - Multiple resolutions: large, medium, small, x-small
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}